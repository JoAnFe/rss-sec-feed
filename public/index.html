<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SecFeed — Cyber & Frontier AI Headlines</title>
<style>
  :root{
    --bg:#0a0e14; --bg2:#0f141d; --card:#111722; --card2:#151d2a;
    --line:#1e2735; --text:#e6edf3; --muted:#8b98a9; --faint:#5b6879;
    --cyber:#22d3ee; --ai:#a78bfa; --gold:#f5c542; --ok:#34d399; --bad:#f87171;
    --accent:#38bdf8; --exploit:#fb7185; --intel:#34d399; --action:#f59e0b;
    --actor:#e879f9; --malware:#fb923c;
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#f4f6f9; --bg2:#eef1f6; --card:#ffffff; --card2:#f7f9fc;
      --line:#dde3ec; --text:#111827; --muted:#5b6675; --faint:#93a0b1;
      --cyber:#0891b2; --ai:#7c3aed; --gold:#b8860b; --ok:#059669; --bad:#dc2626;
      --accent:#0284c7; --exploit:#dc2626; --intel:#059669; --action:#b45309;
      --actor:#a21caf; --malware:#c2410c;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  a{color:inherit;text-decoration:none}

  header{
    position:sticky; top:0; z-index:20;
    background:color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .wrap{max-width:880px; margin:0 auto; padding:0 16px}
  .bar{display:flex; align-items:center; gap:12px; padding:12px 0}
  .brand{display:flex; align-items:center; gap:9px; font-weight:700; font-size:17px; letter-spacing:.2px; white-space:nowrap}
  .brand .logo{width:26px;height:26px;flex:none}
  .brand small{font-weight:500;color:var(--muted);font-size:12px;margin-top:3px}
  #status{margin-left:auto; text-align:right; font-size:12px; color:var(--muted); line-height:1.35; white-space:nowrap}
  #status b{color:var(--text);font-weight:600}
  #refreshBtn{
    flex:none; border:1px solid var(--line); background:var(--card); color:var(--text);
    border-radius:8px; padding:7px 12px; font-size:13px; cursor:pointer;
  }
  #refreshBtn:hover{border-color:var(--accent)}
  #refreshBtn.spin svg{animation:rot 1s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}

  .controls{display:flex; flex-wrap:wrap; gap:8px; padding:0 0 12px; align-items:center}
  .tabs{display:flex; gap:4px; background:var(--card); border:1px solid var(--line); border-radius:9px;
    padding:3px;max-width:100%;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tabs button{
    border:0; background:transparent; color:var(--muted); font-size:13px; font-weight:600;
    padding:6px 12px; border-radius:7px; cursor:pointer;white-space:nowrap;
  }
  .tabs button.on{background:var(--card2); color:var(--text); box-shadow:inset 0 0 0 1px var(--line)}
  .tabs button .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:1px}
  #search{
    flex:1; min-width:160px; border:1px solid var(--line); background:var(--card); color:var(--text);
    border-radius:9px; padding:8px 12px; font-size:14px; outline:none;
  }
  #search:focus{border-color:var(--accent)}
  select,#sourcesBtn,#saveViewBtn,#deleteViewBtn{
    border:1px solid var(--line); background:var(--card); color:var(--text);
    border-radius:9px; padding:8px 10px; font-size:13px; cursor:pointer;
  }
  .read-toggle{display:flex;align-items:center;gap:5px;color:var(--muted);font-size:12px;
    white-space:nowrap;padding:0 4px}
  .read-toggle input{accent-color:var(--accent)}

  #progress{height:3px; background:transparent; position:relative; overflow:hidden}
  #progress.on{background:var(--line)}
  #progress .fill{position:absolute;inset:0;right:100%;background:linear-gradient(90deg,var(--cyber),var(--ai));transition:right .4s}

  main{padding:14px 0 60px}
  .note{font-size:12.5px;color:var(--muted);padding:2px 2px 10px}
  #hero{margin-bottom:16px}
  .hero-head{display:flex;align-items:baseline;gap:8px;font-size:11px;font-weight:700;
    letter-spacing:1px;color:var(--muted);text-transform:uppercase;padding:2px 2px 8px}
  .hero-head .dot{display:inline-block;width:7px;height:7px;border-radius:50%;
    background:var(--bad);align-self:center;animation:pulse 2s infinite}
  @keyframes pulse{50%{opacity:.3}}
  .hero-sub{font-weight:500;letter-spacing:.2px;text-transform:none;color:var(--faint)}
  .hero-card{border-left:3px solid var(--accent)}
  .hero-card .title{font-size:16px}
  .hero-srcs{color:var(--gold);font-weight:700}
  .hero-also{color:var(--faint)}
  .item{
    display:flex; gap:12px; padding:13px 14px; margin-bottom:8px;
    background:var(--card); border:1px solid var(--line); border-radius:12px;
  }
  .item:hover{border-color:color-mix(in srgb, var(--accent) 45%, var(--line))}
  .item.read .body{opacity:.62}
  .fav{width:20px;height:20px;flex:none;margin-top:2px;border-radius:5px;overflow:hidden}
  .fav img{width:20px;height:20px;display:block}
  .fav .ph{width:20px;height:20px;display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:700;color:var(--bg);border-radius:5px}
  .body{flex:1;min-width:0}
  .item-actions{display:flex;flex-direction:column;gap:5px;flex:none}
  .item-actions button{width:29px;height:29px;border:1px solid var(--line);border-radius:7px;
    background:var(--card2);color:var(--muted);cursor:pointer;font-size:15px;line-height:1}
  .item-actions button:hover{border-color:var(--accent);color:var(--text)}
  .item-actions button.on{color:var(--gold);border-color:color-mix(in srgb,var(--gold) 50%,var(--line))}
  .title{font-size:15px;font-weight:600;line-height:1.35;word-wrap:break-word}
  .title a:hover{text-decoration:underline}
  .meta{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-top:5px;font-size:12px;color:var(--muted)}
  .src{font-weight:600;color:var(--text);opacity:.85}
  .star{color:var(--gold)}
  .badge{font-size:10px;font-weight:700;letter-spacing:.6px;padding:2px 7px;border-radius:99px}
  .badge.cyber{color:var(--cyber);background:color-mix(in srgb, var(--cyber) 14%, transparent)}
  .badge.ai{color:var(--ai);background:color-mix(in srgb, var(--ai) 14%, transparent)}
  .badge.xai{color:var(--ai);background:transparent;box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--ai) 50%, transparent)}
  .badge.exploit{color:var(--exploit);background:color-mix(in srgb, var(--exploit) 14%, transparent)}
  .badge.cve{color:var(--accent);background:color-mix(in srgb, var(--accent) 14%, transparent)}
  .badge.intel{color:var(--intel);background:color-mix(in srgb, var(--intel) 14%, transparent)}
  .badge.action{color:var(--action);background:color-mix(in srgb, var(--action) 14%, transparent)}
  .badge.ransom{color:#fff;background:var(--exploit);font-weight:800;letter-spacing:.4px}
  .badge.epss{color:var(--action);background:transparent;box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--action) 55%, transparent)}
  .badge.kevdue{color:var(--accent);background:color-mix(in srgb, var(--accent) 12%, transparent)}
  .badge.actor{color:var(--actor);background:color-mix(in srgb, var(--actor) 14%, transparent);cursor:pointer;border:0}
  .badge.malware{color:var(--malware);background:color-mix(in srgb, var(--malware) 14%, transparent);cursor:pointer;border:0}
  .action-reasons{margin-top:7px;font-size:12px;color:var(--action);font-weight:600}
  .time{color:var(--faint)}
  .coverage-btn{border:0;background:transparent;color:var(--accent);padding:0;font:inherit;
    font-weight:600;cursor:pointer}
  .coverage-btn:hover{text-decoration:underline}
  .coverage-list{margin-top:8px;padding:8px 10px;border-left:2px solid var(--line);
    background:var(--card2);border-radius:0 8px 8px 0;font-size:12px}
  .coverage-list a{display:block;color:var(--muted);padding:3px 0}
  .coverage-list a:hover{color:var(--text);text-decoration:underline}
  .coverage-list b{color:var(--text);font-weight:600}
  .sum{margin-top:5px;font-size:13px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .skel{height:74px;border-radius:12px;margin-bottom:8px;border:1px solid var(--line);
    background:linear-gradient(100deg,var(--card) 40%,var(--card2) 50%,var(--card) 60%);
    background-size:200% 100%; animation:sh 1.4s infinite}
  @keyframes sh{to{background-position:-200% 0}}
  #moreBtn{
    display:block;margin:18px auto 0;border:1px solid var(--line);background:var(--card);
    color:var(--text);border-radius:9px;padding:10px 26px;font-size:14px;cursor:pointer;
  }
  #moreBtn:hover{border-color:var(--accent)}
  .empty{padding:60px 0;text-align:center;color:var(--muted)}

  /* sources panel */
  #backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:30;display:none}
  #panel{
    position:fixed;top:0;right:-420px;width:min(420px,94vw);height:100%;z-index:31;
    background:var(--bg2);border-left:1px solid var(--line);transition:right .25s;
    display:flex;flex-direction:column;
  }
  #panel.open{right:0}
  #backdrop.open{display:block}
  .phead{padding:16px;border-bottom:1px solid var(--line)}
  .phead h2{margin:0 0 4px;font-size:16px}
  .phead .sub{font-size:12px;color:var(--muted)}
  .pactions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .pactions button{border:1px solid var(--line);background:var(--card);color:var(--text);
    border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer}
  .plist{flex:1;overflow-y:auto;padding:8px 10px 30px}
  .pgroup{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);
    text-transform:uppercase;padding:14px 6px 6px}
  .prow{display:flex;align-items:center;gap:9px;padding:7px 6px;border-radius:8px;font-size:13px}
  .prow:hover{background:var(--card)}
  .prow input{accent-color:var(--accent);flex:none}
  .health{width:8px;height:8px;border-radius:50%;flex:none}
  .health.ok{background:var(--ok)} .health.error{background:var(--bad)} .health.pending{background:var(--faint)}
  .pname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pcount{font-size:11px;color:var(--faint);flex:none}
  .pclose{position:absolute;top:14px;right:14px;border:0;background:transparent;color:var(--muted);
    font-size:20px;cursor:pointer;line-height:1}
  @media (max-width:640px){
    #status{display:none}
    .sum{-webkit-line-clamp:3}
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="bar">
      <div class="brand">
        <svg class="logo" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 2l8 3.5v5.7c0 5-3.4 9.2-8 10.8-4.6-1.6-8-5.8-8-10.8V5.5L12 2z"
                stroke="var(--cyber)" stroke-width="1.6" fill="color-mix(in srgb, var(--cyber) 8%, transparent)"/>
          <path d="M8.5 12.2l2.3 2.3 4.7-4.9" stroke="var(--ai)" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div>SecFeed<br><small>cyber &amp; frontier-AI headlines</small></div>
      </div>
      <div id="status">loading…</div>
      <button id="refreshBtn" title="Fetch all feeds now">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" style="vertical-align:-1px">
          <path d="M20 12a8 8 0 1 1-2.3-5.6M20 3v5h-5" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Refresh
      </button>
    </div>
    <div class="controls">
      <div class="tabs" id="tabs">
        <button data-tab="all" class="on">All</button>
        <button data-tab="actionable"><span class="dot" style="background:var(--action)"></span>Actionable</button>
        <button data-tab="bookmarks"><span class="dot" style="background:var(--gold)"></span>Bookmarks</button>
        <button data-tab="cyber"><span class="dot" style="background:var(--cyber)"></span>Cybersecurity</button>
        <button data-tab="ai"><span class="dot" style="background:var(--ai)"></span>Frontier AI</button>
        <button data-tab="exploited"><span class="dot" style="background:var(--exploit)"></span>Exploited CVEs</button>
        <button data-tab="intel"><span class="dot" style="background:var(--intel)"></span>Threat Intel</button>
      </div>
      <input id="search" type="search" placeholder="Search headlines…  ( / )" autocomplete="off">
      <select id="sort" title="Sort order">
        <option value="smart">Top (relevance + recency)</option>
        <option value="latest">Newest</option>
      </select>
      <button id="sourcesBtn">Sources</button>
      <label class="read-toggle"><input id="hideRead" type="checkbox">Hide read</label>
      <select id="savedViews" title="Saved views"><option value="">Saved views</option></select>
      <button id="saveViewBtn">Save view</button>
      <button id="deleteViewBtn" hidden>Delete view</button>
    </div>
  </div>
  <div id="progress"><div class="fill"></div></div>
</header>

<div class="wrap"><main>
  <section id="hero" hidden>
    <div class="hero-head"><span class="dot"></span>Breaking News
      <span class="hero-sub">multi-source stories · last 48h</span></div>
    <div id="heroList"></div>
  </section>
  <div class="note" id="note" hidden></div>
  <div id="feed"></div>
  <button id="moreBtn" hidden>Load more</button>
</main></div>

<div id="backdrop"></div>
<aside id="panel" aria-label="Sources">
  <button class="pclose" id="pclose" aria-label="Close">✕</button>
  <div class="phead">
    <h2>Sources</h2>
    <div class="sub" id="psub">…</div>
    <div class="pactions">
      <button id="allOn">All on</button>
      <button id="allOff">All off</button>
      <button id="prefOnly">★ Preferred only</button>
    </div>
  </div>
  <div class="plist" id="plist"></div>
</aside>

<script>
"use strict";
const $ = id => document.getElementById(id);
const PAGE = 100;
const PREFERRED_BOOST = 12 * 3600;  // mirror of server-side smart sort
const RELEVANCE_BOOST = 10 * 60;    // each relevance point is worth 10m
const ACTION_THRESHOLD = 30;
const ACTION_BOOST = 30 * 60;
const DIVERSITY_WINDOW = 50;
const MAX_PER_SOURCE = 3;
const COVERAGE_WINDOW = 72 * 3600;
const COVERAGE_STOPWORDS = new Set((
  "a an and are as at be by for from has have how in is it its new of on or over than " +
  "that the this to via vs was what when why will with you your after more say says said " +
  "report reports researchers hackers attackers security update patch patches now could may " +
  "2024 2025 2026"
).split(/\s+/));
// Mirror of server-side THREAT_ACTORS/MALWARE_FAMILIES alias tables (canonical
// -> aliases). Used for badge tooltips and alias-aware search: searching any
// alias finds stories tagged with the canonical name. Keep in sync with server.py.
const ACTOR_ALIASES = {
  "APT28": ["apt 28", "fancy bear", "sofacy", "forest blizzard", "strontium", "pawn storm", "sednit"],
  "APT29": ["apt 29", "cozy bear", "midnight blizzard", "nobelium", "the dukes"],
  "Sandworm": ["seashell blizzard", "voodoo bear", "telebots"],
  "Turla": ["secret blizzard", "venomous bear"],
  "Gamaredon": ["aqua blizzard", "primitive bear"],
  "Star Blizzard": ["coldriver", "callisto group", "seaborgium"],
  "APT41": ["apt 41", "winnti", "wicked panda", "double dragon", "brass typhoon"],
  "APT40": ["apt 40", "leviathan", "gingham typhoon"],
  "APT31": ["apt 31", "zirconium", "violet typhoon"],
  "APT10": ["apt 10", "stone panda", "cicada"],
  "Volt Typhoon": ["vanguard panda"],
  "Salt Typhoon": ["earth estries"],
  "Flax Typhoon": [],
  "Mustang Panda": ["twill typhoon", "bronze president"],
  "Lazarus": ["hidden cobra", "diamond sleet"],
  "Kimsuky": ["emerald sleet", "velvet chollima"],
  "Andariel": ["onyx sleet", "silent chollima"],
  "BlueNoroff": ["sapphire sleet"],
  "APT37": ["apt 37", "scarcruft", "ricochet chollima"],
  "Charming Kitten": ["apt 35", "mint sandstorm", "phosphorus"],
  "MuddyWater": ["mango sandstorm", "static kitten", "seedworm"],
  "OilRig": ["apt 34", "helix kitten", "hazel sandstorm"],
  "APT33": ["apt 33", "peach sandstorm", "refined kitten", "elfin"],
  "Scattered Spider": ["octo tempest", "unc3944", "muddled libra", "0ktapus"],
  "LockBit": [],
  "Cl0p": ["clop", "lace tempest", "ta505"],
  "ALPHV": ["blackcat"],
  "Black Basta": [],
  "Akira": [],
  "Play": ["playcrypt"],
  "Medusa": [],
  "Royal": ["blacksuit"],
  "RansomHub": [],
  "Qilin": [],
  "Rhysida": [],
  "BianLian": [],
  "8Base": [],
  "Conti": [],
  "REvil": ["sodinokibi"],
  "Hive": [],
  "FIN7": ["carbanak", "sangria tempest"],
  "FIN8": ["syssphinx"],
  "Evil Corp": ["indrik spider"],
  "Wizard Spider": [],
  "Killnet": [],
  "Anonymous Sudan": [],
};
const MALWARE_ALIASES = {
  "Cobalt Strike": [], "Sliver": [], "Emotet": [], "Qakbot": ["qbot"],
  "TrickBot": [], "IcedID": [], "Bumblebee": [], "DarkGate": [],
  "SocGholish": [], "Raspberry Robin": [], "PlugX": ["korplug"],
  "ShadowPad": [], "AsyncRAT": [], "Remcos": [], "Agent Tesla": [],
  "FormBook": [], "XWorm": [], "NanoCore": [], "njRAT": [],
  "Gh0st RAT": [], "Lumma": ["lummac2"], "RedLine": [], "Vidar": [],
  "Raccoon": [], "StealC": [], "Rhadamanthys": [], "Amadey": [],
  "Mirai": [], "XMRig": [], "BlackLotus": [], "Pegasus": [],
  "Predator": [], "Industroyer": [], "Stuxnet": [], "WannaCry": [],
  "NotPetya": [],
};

// Template words shared by advisory feeds; ignored when matching cross-source
// coverage so different products don't merge on boilerplate (mirror of server).
const ADVISORY_BOILERPLATE = new Set((
  "multiple vulnerabilities vulnerability allow allows allowing arbitrary code execution " +
  "remote lead leads leading could issue issues flaw flaws affected affecting versions " +
  "version advisory advisories bulletin bulletins released release high critical medium " +
  "severity impact"
).split(/\s+/));
function storedJSON(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); }
  catch { return fallback; }
}
const state = {
  tab: localStorage.getItem("tab") || "all",
  sort: localStorage.getItem("sort") || "smart",
  q: "",
  offset: 0,
  total: 0,
  disabled: new Set(storedJSON("disabled", [])),
  bookmarks: new Set(storedJSON("bookmarks", [])),
  bookmarkData: storedJSON("bookmarkData", {}),  // id -> item snapshot; survives corpus rotation
  read: new Set(storedJSON("read", [])),
  hideRead: localStorage.getItem("hideRead") === "1",
  savedViews: storedJSON("savedViews", []),
  expanded: new Set(),  // rep ids whose coverage list is open; survives re-render
  sources: null,
  pollTimer: null,
  corpus: null,     // full item list from data/items.json
  corpusSig: null,  // cheap fingerprint to skip no-op ambient re-renders
  viewCache: null,  // memoized {key, rows} for the current filter/grouping
  meta: null,       // payload metadata (counts, generated_at, refresh)
  breaking: null,   // clusters from data/breaking.json
  mode: "static",   // "live" when served by server.py, "static" on Pages
};
if (!Array.isArray(state.savedViews)) state.savedViews = [];

/* ---------- helpers ---------- */
function timeago(ts, guessed) {
  const s = Math.max(0, Date.now() / 1000 - ts);
  let t;
  if (s < 90) t = "just now";
  else if (s < 3600) t = Math.round(s / 60) + "m ago";
  else if (s < 86400) t = Math.round(s / 3600) + "h ago";
  else if (s < 86400 * 14) t = Math.round(s / 86400) + "d ago";
  else t = new Date(ts * 1000).toLocaleDateString();
  return (guessed ? "~" : "") + t;
}
function domainOf(u) { try { return new URL(u).hostname; } catch { return ""; } }
function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;
  return n;
}
const PALETTE = ["#22d3ee","#a78bfa","#34d399","#f5c542","#fb7185","#60a5fa","#f97316"];
function favicon(item) {
  const box = el("div", "fav");
  const dom = domainOf(item.site || item.link);
  const ph = el("div", "ph", (item.source_name || "?")[0].toUpperCase());
  ph.style.background = PALETTE[[...item.source].reduce((a, c) => a + c.charCodeAt(0), 0) % PALETTE.length];
  if (dom) {
    const img = new Image();
    img.src = "https://www.google.com/s2/favicons?domain=" + encodeURIComponent(dom) + "&sz=64";
    img.alt = "";
    img.onerror = () => { img.replaceWith(ph); };
    box.appendChild(img);
  } else box.appendChild(ph);
  return box;
}

function persistSet(key, values, max = 5000) {
  while (values.size > max) values.delete(values.values().next().value);
  localStorage.setItem(key, JSON.stringify([...values]));
}

// Only http(s) links may reach an href — feed-derived "javascript:"/"data:"
// URLs would otherwise execute in-origin when clicked.
function safeHref(raw) {
  if (!raw) return "#";
  try {
    const scheme = new URL(raw, location.href).protocol;
    return (scheme === "http:" || scheme === "https:") ? raw : "#";
  } catch { return "#"; }
}

// A merged coverage row stands in for every clustered member. Read/bookmark
// state keys on ALL member ids so it stays consistent no matter which member
// happens to be the representative in the current tab/search/refresh.
function memberIds(item) {
  return (item.member_ids && item.member_ids.length) ? item.member_ids : [item.id];
}
function isRead(item) { return memberIds(item).some(id => state.read.has(id)); }
function isBookmarked(item) { return memberIds(item).some(id => state.bookmarks.has(id)); }

function markRead(item, read = true) {
  for (const id of memberIds(item)) {
    state.read.delete(id);            // re-insert so the LRU cap drops oldest
    if (read) state.read.add(id);
  }
  persistSet("read", state.read);
}

function slimBookmark(item) {
  return {
    id: item.id, title: item.title, link: item.link, ts: item.ts,
    guessed: item.guessed, summary: item.summary, topics: item.topics || [],
    cves: item.cves || [], relevance: item.relevance || 0,
    action_score: item.action_score || 0, action_level: item.action_level || "low",
    action_reasons: item.action_reasons || [], source: item.source,
    source_name: item.source_name, category: item.category, preferred: item.preferred,
    site: item.site,
  };
}

function persistBookmarkData() {
  for (const id of Object.keys(state.bookmarkData))
    if (!state.bookmarks.has(id)) delete state.bookmarkData[id];
  localStorage.setItem("bookmarkData", JSON.stringify(state.bookmarkData));
}

function toggleBookmark(item) {
  const ids = memberIds(item);
  const byId = new Map((state.corpus || []).map(it => [it.id, it]));
  if (isBookmarked(item)) {
    for (const id of ids) { state.bookmarks.delete(id); delete state.bookmarkData[id]; }
  } else {
    for (const id of ids) {
      state.bookmarks.add(id);
      const raw = byId.get(id);            // snapshot so it survives corpus rotation
      if (raw) state.bookmarkData[id] = slimBookmark(raw);
    }
  }
  persistSet("bookmarks", state.bookmarks);
  persistBookmarkData();
}

function coverageURL(raw) {
  try {
    const u = new URL(raw);
    u.hash = "";
    u.hostname = u.hostname.replace(/^www\./, "");
    for (const key of [...u.searchParams.keys()])
      if (key.startsWith("utm_") || ["fbclid","gclid","mc_cid","mc_eid","ref","source"].includes(key))
        u.searchParams.delete(key);
    u.pathname = u.pathname.replace(/\/$/, "") || "/";
    return u.toString();
  } catch { return raw || ""; }
}

function coverageTokens(title) {
  return new Set((title.toLowerCase().match(/[a-z0-9][a-z0-9+.#-]{2,}/g) || [])
    .filter(token => !COVERAGE_STOPWORDS.has(token)));
}

function similarCoverage(item, tokens, cluster) {
  const cves = new Set(item.cves || []), seedCves = cluster.cves;
  const shared = [...cves].filter(cve => seedCves.has(cve));
  if (cves.size && seedCves.size && !shared.length) return false;
  if (shared.length && cves.size <= 3 && seedCves.size <= 3) return true;
  if (item.source === cluster.source)
    return tokens.size >= 3 && tokens.size === cluster.tokens.size &&
      [...tokens].every(token => cluster.tokens.has(token));
  // Cross-source: compare only distinctive tokens so templated advisories about
  // different products don't merge on shared boilerplate.
  const content = [...tokens].filter(t => !ADVISORY_BOILERPLATE.has(t));
  const seedContent = [...cluster.tokens].filter(t => !ADVISORY_BOILERPLATE.has(t));
  const seedSet = new Set(seedContent);
  let intersection = 0;
  for (const token of content) if (seedSet.has(token)) intersection++;
  return intersection >= 3 &&
    intersection / Math.max(1, Math.min(content.length, seedContent.length)) >= .6;
}

function groupCoverage(items) {
  const clusters = [];
  for (const item of items.slice().sort((a, b) => b.ts - a.ts)) {
    const tokens = coverageTokens(item.title), url = coverageURL(item.link);
    let target = null;
    for (const cluster of clusters) {
      const sameURL = url && url === cluster.url;
      const close = Math.abs(item.ts - cluster.ts) <= COVERAGE_WINDOW;
      if (sameURL || (close && similarCoverage(item, tokens, cluster))) {
        target = cluster; break;
      }
    }
    if (target) target.members.push(item);
    else clusters.push({ts:item.ts, url, tokens, cves:new Set(item.cves || []),
      source:item.source, members:[item]});
  }
  return clusters.map(cluster => {
    const members = cluster.members;
    const rep = members.slice().sort((a, b) =>
      (b.preferred - a.preferred) || ((b.relevance || 0) - (a.relevance || 0)) ||
      (a.guessed - b.guessed) || ((b.summary || "").length - (a.summary || "").length) ||
      (b.ts - a.ts))[0];
    const merged = Object.assign({}, rep);
    merged.member_ids = members.map(item => item.id);
    merged.intel = mergeIntel(members);   // most severe TI signal across the cluster
    merged.ts = Math.max(...members.map(item => item.ts));
    merged.relevance = Math.max(...members.map(item => item.relevance || 0));
    const actionItem = members.slice().sort((a, b) =>
      (b.action_score || 0) - (a.action_score || 0))[0];
    merged.action_score = actionItem.action_score || 0;
    merged.action_level = actionItem.action_level || "low";
    merged.action_reasons = [...new Set(members.flatMap(item => item.action_reasons || []))];
    merged.topics = [...new Set(members.flatMap(item => item.topics || []))].sort();
    merged.cves = [...new Set(members.flatMap(item => item.cves || []))].sort();
    merged.actors = [...new Set(members.flatMap(item => item.actors || []))].sort();
    merged.malware = [...new Set(members.flatMap(item => item.malware || []))].sort();
    merged.coverage_count = members.length;
    merged.coverage_sources_count = new Set(members.map(item => item.source)).size;
    merged.coverage = members.filter(item => item !== rep).slice(0, 12).map(item => ({
      title:item.title, link:item.link, ts:item.ts, source:item.source,
      source_name:item.source_name, preferred:item.preferred,
    }));
    return merged;
  });
}

// Reduce the per-member TI enrichment to the most severe signal for the
// merged coverage row (mirror of server-side item_intel over the union).
function mergeIntel(members) {
  const intels = members.map(m => m.intel).filter(Boolean);
  if (!intels.length) return undefined;
  const out = {};
  if (intels.some(i => i.kev)) out.kev = true;
  if (intels.some(i => i.ransomware)) out.ransomware = true;
  const dues = intels.map(i => i.kev_due).filter(Boolean).sort();
  if (dues.length) out.kev_due = dues[0];
  const prod = intels.find(i => i.kev_product);
  if (prod) out.kev_product = prod.kev_product;
  const epssIntels = intels.filter(i => typeof i.epss === "number");
  if (epssIntels.length) {
    const top = epssIntels.reduce((a, b) => (b.epss > a.epss ? b : a));
    out.epss = top.epss;
    out.epss_pct = top.epss_pct;
    if (intels.some(i => i.epss_high)) out.epss_high = true;
  }
  return out;
}

/* ---------- rendering ---------- */
function searchFor(name) {
  state.q = name;
  $("search").value = name;
  clearSavedSelection();
  applyView(false);
}

// Clickable ACTOR / MALWARE chips: tooltip lists the aliases, clicking filters
// the feed to that name (alias-aware search handles the rest).
function catalogBadges(meta, names, cls, aliasMap, max = 2) {
  if (!names || !names.length) return;
  for (const name of names.slice(0, max)) {
    const b = el("button", "badge " + cls, name.toUpperCase());
    b.type = "button";
    const aliases = aliasMap[name] || [];
    b.title = "Filter stories about " + name
      + (aliases.length ? " · aka " + aliases.join(", ") : "");
    b.addEventListener("click", () => searchFor(name));
    meta.appendChild(b);
  }
  if (names.length > max) {
    const rest = el("span", "badge " + cls, "+" + (names.length - max));
    rest.title = names.slice(max).join(", ");
    meta.appendChild(rest);
  }
}

function intelBadges(meta, item) {
  const intel = item.intel;
  if (!intel) return;
  if (intel.ransomware) {
    const b = el("span", "badge ransom", "RANSOMWARE");
    b.title = "Linked to known ransomware campaigns (CISA KEV)";
    meta.appendChild(b);
  }
  if (intel.epss_high && typeof intel.epss === "number") {
    const pct = Math.round(intel.epss * 100);
    const b = el("span", "badge epss", "EPSS " + pct + "%");
    b.title = "FIRST EPSS: " + pct + "% predicted exploitation probability in the next 30 days"
      + (typeof intel.epss_pct === "number" ? " (" + Math.round(intel.epss_pct * 100) + "th percentile)" : "");
    meta.appendChild(b);
  }
  if (intel.kev_due) {
    const overdue = new Date(intel.kev_due + "T23:59:59Z") < new Date();
    const b = el("span", "badge " + (overdue ? "ransom" : "kevdue"),
      (overdue ? "KEV OVERDUE " : "KEV due ") + intel.kev_due);
    b.title = "CISA KEV remediation deadline " + intel.kev_due
      + (intel.kev_product ? " — " + intel.kev_product : "");
    meta.appendChild(b);
  }
}

function topicBadges(meta, item) {
  const tps = item.topics || [], cves = item.cves || [];
  if (item.category !== "ai" && tps.includes("ai"))
    meta.appendChild(el("span", "badge xai", "AI"));
  if (tps.includes("kev")) {
    const b = el("span", "badge exploit", "CISA KEV");
    if (cves.length) b.title = cves.join(", ");
    meta.appendChild(b);
  } else if (tps.includes("exploited")) {
    const b = el("span", "badge exploit", "EXPLOITED");
    if (cves.length) b.title = cves.join(", ");
    meta.appendChild(b);
  } else if (cves.length) {
    const b = el("span", "badge cve",
      cves[0] + (cves.length > 1 ? " +" + (cves.length - 1) : ""));
    b.title = cves.join(", ");
    meta.appendChild(b);
  }
  if (tps.includes("threatintel")) meta.appendChild(el("span", "badge intel", "INTEL"));
  catalogBadges(meta, item.actors, "actor", ACTOR_ALIASES);
  catalogBadges(meta, item.malware, "malware", MALWARE_ALIASES);
  intelBadges(meta, item);
  if ((item.action_score || 0) >= ACTION_THRESHOLD) {
    const b = el("span", "badge action", (item.action_level || "medium").toUpperCase());
    b.title = (item.action_reasons || []).join(" · ");
    meta.appendChild(b);
  }
}

function row(item) {
  const it = el("article", "item");
  if (isRead(item)) it.classList.add("read");
  it.appendChild(favicon(item));
  const body = el("div", "body");

  const title = el("div", "title");
  const a = el("a", null, item.title);
  a.href = safeHref(item.link); a.target = "_blank"; a.rel = "noopener noreferrer";
  a.addEventListener("click", () => {
    markRead(item, true);
    it.classList.add("read");
    syncActions();                 // keep the read toggle in sync with the row
    if (state.hideRead) setTimeout(() => applyView(false), 0);
  });
  title.appendChild(a);
  body.appendChild(title);

  const meta = el("div", "meta");
  if (item.preferred) meta.appendChild(el("span", "star", "★"));
  meta.appendChild(el("span", "src", item.source_name));
  meta.appendChild(el("span", "badge " + (item.category === "ai" ? "ai" : "cyber"),
    item.category === "ai" ? "AI" : "CYBER"));
  topicBadges(meta, item);
  let coverageBtn = null;
  if ((item.coverage_count || 1) > 1) {
    const sources = item.coverage_sources_count || 1;
    const label = sources > 1 ? `${sources} sources` : `${item.coverage_count} reports`;
    coverageBtn = el("button", "coverage-btn", label);
    coverageBtn.type = "button";
    coverageBtn.setAttribute("aria-expanded", "false");
    meta.appendChild(coverageBtn);
  }
  const t = el("span", "time", timeago(item.ts, item.guessed));
  if (item.guessed) t.title = "Feed gave no publish date — time first seen";
  meta.appendChild(t);
  body.appendChild(meta);

  if (coverageBtn && item.coverage && item.coverage.length) {
    const list = el("div", "coverage-list");
    const open = state.expanded.has(item.id);   // restore expansion across re-renders
    list.hidden = !open;
    coverageBtn.setAttribute("aria-expanded", String(open));
    for (const report of item.coverage) {
      const link = el("a");
      link.href = safeHref(report.link); link.target = "_blank"; link.rel = "noopener noreferrer";
      const source = el("b", null, report.source_name);
      link.appendChild(source);
      link.appendChild(document.createTextNode(` — ${report.title} · ${timeago(report.ts)}`));
      list.appendChild(link);
    }
    coverageBtn.addEventListener("click", () => {
      list.hidden = !list.hidden;
      if (list.hidden) state.expanded.delete(item.id); else state.expanded.add(item.id);
      coverageBtn.setAttribute("aria-expanded", String(!list.hidden));
    });
    body.appendChild(list);
  }

  if (state.tab === "actionable" && item.action_reasons && item.action_reasons.length)
    body.appendChild(el("div", "action-reasons", "Why: " + item.action_reasons.join(" · ")));

  if (item.summary) body.appendChild(el("div", "sum", item.summary));
  it.appendChild(body);

  const actions = el("div", "item-actions");
  const bookmark = el("button");
  bookmark.type = "button";
  const read = el("button");
  read.type = "button";
  function syncActions() {
    const bookmarked = isBookmarked(item), read_ = isRead(item);
    bookmark.textContent = bookmarked ? "★" : "☆";
    bookmark.classList.toggle("on", bookmarked);
    bookmark.setAttribute("aria-label", bookmarked ? "Remove bookmark" : "Add bookmark");
    bookmark.title = bookmarked ? "Remove bookmark" : "Add bookmark";
    read.textContent = read_ ? "✓" : "○";
    read.setAttribute("aria-label", read_ ? "Mark unread" : "Mark read");
    read.title = read_ ? "Mark unread" : "Mark read";
  }
  bookmark.addEventListener("click", () => {
    toggleBookmark(item);
    if (state.tab === "bookmarks") applyView(false); else syncActions();
  });
  read.addEventListener("click", () => {
    markRead(item, !isRead(item));
    it.classList.toggle("read", isRead(item));
    if (state.hideRead) applyView(false); else syncActions();
  });
  syncActions();
  actions.appendChild(bookmark);
  actions.appendChild(read);
  it.appendChild(actions);
  return it;
}

function heroCard(item) {
  const card = el("article", "item hero-card");
  card.appendChild(favicon(item));
  const body = el("div", "body");

  const title = el("div", "title");
  const a = el("a", null, item.title);
  a.href = safeHref(item.link); a.target = "_blank"; a.rel = "noopener noreferrer";
  a.addEventListener("click", () => markRead(item, true));
  title.appendChild(a);
  body.appendChild(title);

  const meta = el("div", "meta");
  if (item.preferred) meta.appendChild(el("span", "star", "★"));
  meta.appendChild(el("span", "src", item.source_name));
  if (item.sources_count > 1) {
    meta.appendChild(el("span", "hero-srcs", item.sources_count + " sources"));
    if (item.other_sources && item.other_sources.length)
      meta.appendChild(el("span", "hero-also",
        "also on " + item.other_sources.join(", ")));
  }
  topicBadges(meta, item);
  meta.appendChild(el("span", "time", timeago(item.ts, item.guessed)));
  body.appendChild(meta);

  if (item.summary) body.appendChild(el("div", "sum", item.summary));
  card.appendChild(body);
  return card;
}

function renderHero(list) {
  const box = $("heroList");
  box.textContent = "";
  for (const it of list) box.appendChild(heroCard(it));
  $("hero").hidden = !list.length;
}

function pickRep(members) {
  return members.slice().sort((a, b) =>
    ((b.relevance || 0) - (a.relevance || 0)) ||
    (b.preferred - a.preferred) || (a.guessed - b.guessed) ||
    (b.summary.length - a.summary.length))[0];
}

function renderHeroView() {
  // the hero fronts the unfiltered view only — other tabs/search are focused modes
  const clusters = state.breaking && state.breaking.clusters;
  if (state.tab !== "all" || state.q || !clusters) { $("hero").hidden = true; return; }
  const out = [];
  for (const cl of clusters) {
    const ms = cl.members.filter(m => !state.disabled.has(m.source) &&
      !(state.hideRead && state.read.has(m.id)));
    if (!ms.length) continue;
    const rep = Object.assign({}, pickRep(ms));
    const others = [];
    for (const m of ms.slice().sort((a, b) => b.ts - a.ts))
      if (m.source_name !== rep.source_name && !others.includes(m.source_name))
        others.push(m.source_name);
    rep.sources_count = new Set(ms.map(m => m.source)).size;
    rep.other_sources = others.slice(0, 3);
    rep.member_ids = ms.map(m => m.id);   // marking read dismisses the whole story
    out.push(rep);
    if (out.length >= 5) break;
  }
  renderHero(out);
}

function skeletons(n) {
  const f = $("feed");
  f.textContent = "";
  for (let i = 0; i < n; i++) f.appendChild(el("div", "skel"));
}

function renderItems(items, append) {
  const f = $("feed");
  if (!append) f.textContent = "";
  if (!items.length && !append) {
    f.appendChild(el("div", "empty",
      state.q ? "No stories match your search." :
      state.tab === "bookmarks" ? "No bookmarked stories yet." :
      state.hideRead ? "No unread stories match this view." :
      "No stories yet — feeds are still loading."));
  }
  for (const it of items) f.appendChild(row(it));
  $("moreBtn").hidden = state.offset + PAGE >= state.total;
}

function renderStatus() {
  const d = state.meta;
  if (!d) return;
  const r = d.refresh || {};
  let line1 = `<b>${d.sources_ok}</b>/${d.sources_total} sources live`;
  let line2;
  if (r.running) line2 = `fetching ${r.done}/${r.total}…`;
  else line2 = "updated " + timeago(d.generated_at);
  $("status").innerHTML = line1 + "<br>" + line2;

  const p = $("progress"), fill = p.firstElementChild;
  if (r.running && r.total) {
    p.classList.add("on");
    fill.style.right = (100 - 100 * r.done / r.total) + "%";
    $("refreshBtn").classList.add("spin");
  } else {
    p.classList.remove("on");
    fill.style.right = "100%";
    $("refreshBtn").classList.remove("spin");
  }
}

/* ---------- data ----------
   The page is fully static: data/items.json is the whole corpus (also served
   live by server.py at the same path) and all filtering happens client-side. */
function filterCorpus() {
  const terms = state.q.toLowerCase().split(/\s+/).filter(Boolean);
  let source = state.corpus;
  if (state.tab === "bookmarks") {
    // Union of fresh corpus items and persisted snapshots so bookmarks that
    // have aged out of the served corpus still appear.
    const byId = new Map(state.corpus.map(it => [it.id, it]));
    const seen = new Set();
    source = [];
    for (const id of state.bookmarks) {
      const it = byId.get(id) || state.bookmarkData[id];
      if (it && !seen.has(it.id)) { seen.add(it.id); source.push(it); }
    }
  }
  let out = [];
  for (const it of source) {
    const topics = it.topics || [];
    if (state.disabled.has(it.source)) continue;
    if (state.hideRead && state.read.has(it.id)) continue;
    if (state.tab === "actionable" && (it.action_score || 0) < ACTION_THRESHOLD) continue;
    if (state.tab === "cyber" && it.category !== "cyber") continue;
    if (state.tab === "ai" && !(it.category === "ai" || topics.includes("ai"))) continue;
    if (state.tab === "exploited" && !topics.includes("exploited")) continue;
    if (state.tab === "intel" && !topics.includes("threatintel")) continue;
    if (terms.length) {
      // Alias-aware: tagged actor/malware names and all their aliases join the
      // haystack, so searching "fancy bear" finds stories tagged APT28.
      let blob = (it.title + " " + it.summary + " " + it.source_name).toLowerCase();
      for (const name of it.actors || [])
        blob += " " + name.toLowerCase() + " " + (ACTOR_ALIASES[name] || []).join(" ");
      for (const name of it.malware || [])
        blob += " " + name.toLowerCase() + " " + (MALWARE_ALIASES[name] || []).join(" ");
      if (!terms.every(t => blob.includes(t))) continue;
    }
    out.push(it);
  }
  out = groupCoverage(out);
  if (state.sort === "latest") {
    out.sort((a, b) => b.ts - a.ts);
    return out;
  }
  const smartScore = item => item.ts + (item.preferred ? PREFERRED_BOOST : 0) +
    (item.relevance || 0) * RELEVANCE_BOOST +
    (state.tab === "actionable" ? (item.action_score || 0) * ACTION_BOOST : 0);
  out.sort((a, b) => smartScore(b) - smartScore(a));
  const selected = [], deferred = [], counts = new Map();
  for (const item of out) {
    const count = counts.get(item.source) || 0;
    if (selected.length < DIVERSITY_WINDOW && count < MAX_PER_SOURCE) {
      selected.push(item);
      counts.set(item.source, count + 1);
    } else deferred.push(item);
  }
  return selected.concat(deferred);
}

function corpusSignature(items) {
  // Cheap fingerprint to detect whether an ambient poll actually changed data.
  let h = 2166136261 >>> 0;
  for (const it of items) {
    h = Math.imul(h ^ (it.ts | 0), 16777619) >>> 0;
    const id = it.id || "";
    for (let i = 0; i < id.length; i += 4)
      h = Math.imul(h ^ id.charCodeAt(i), 16777619) >>> 0;
  }
  return items.length + ":" + (h >>> 0);
}

function applyView(append) {
  if (!state.corpus) return;
  if (!append) state.offset = 0;
  // "Load more" reuses the already grouped+sorted rows instead of re-clustering
  // the whole corpus for each page.
  const rows = (append && state.viewCache) ? state.viewCache : filterCorpus();
  state.viewCache = rows;
  state.total = rows.length;
  renderItems(rows.slice(state.offset, state.offset + PAGE), append);
  renderHeroView();
  const note = $("note");
  if (state.disabled.size) {
    note.hidden = false;
    note.textContent = `${state.disabled.size} sources hidden — manage in Sources.`;
  } else if (state.tab === "actionable") {
    note.hidden = false;
    note.textContent = "Prioritised by exploitation, KEV, critical impact, urgent containment and remediation signals.";
  } else note.hidden = true;
}

let fetchSeq = 0;
async function fetchAll() {
  const seq = ++fetchSeq;
  try {
    const [items, breaking] = await Promise.all([
      fetch("data/items.json", { cache: "no-cache" }).then(r => r.json()),
      fetch("data/breaking.json", { cache: "no-cache" }).then(r => r.json()).catch(() => null),
    ]);
    if (seq !== fetchSeq) return;          // stale response
    state.corpus = items.items || [];
    state.meta = items;
    state.breaking = breaking;
    state.mode = items.mode === "live" ? "live" : "static";
    $("refreshBtn").hidden = state.mode !== "live";
    // Only rebuild the list when the data actually changed, so an ambient poll
    // doesn't collapse expanded coverage or reset the reader's pagination.
    const sig = corpusSignature(state.corpus);
    if (sig !== state.corpusSig) {
      state.corpusSig = sig;
      applyView(false);
    }
    renderStatus();
    schedulePoll(items.refresh && items.refresh.running);
  } catch (e) {
    if (!state.corpus) {
      $("feed").textContent = "";
      $("feed").appendChild(el("div", "empty",
        "Can't load feed data — is the site still building?"));
    }
    schedulePoll(false);
  }
}

function schedulePoll(fast) {
  clearTimeout(state.pollTimer);
  const wait = fast ? 2500 : (state.mode === "live" ? 60000 : 300000);
  state.pollTimer = setTimeout(() => {
    // ambient refresh: don't yank the list out from under the reader
    if (fast || (window.scrollY < 150 && state.offset === 0)) fetchAll();
    else schedulePoll(false);
  }, wait);
}

/* ---------- sources panel ---------- */
async function loadSources() {
  const d = await (await fetch("data/sources.json", { cache: "no-cache" })).json();
  state.sources = d.sources;
  // Drop hidden-source ids that no longer exist (e.g. after a source-list cut)
  // so they stop inflating the "N sources hidden" count.
  const known = new Set(d.sources.map(s => s.id));
  let pruned = false;
  for (const id of [...state.disabled])
    if (!known.has(id)) { state.disabled.delete(id); pruned = true; }
  if (pruned) localStorage.setItem("disabled", JSON.stringify([...state.disabled]));
  const list = $("plist");
  list.textContent = "";
  const ok = d.sources.filter(s => s.status === "ok").length;
  const bad = d.sources.filter(s => s.status === "error").length;
  $("psub").textContent =
    `${d.sources.length} total · ${ok} live · ${bad} failing · ${state.disabled.size} hidden`;
  let lastCat = null;
  for (const s of d.sources) {
    if (s.category !== lastCat) {
      lastCat = s.category;
      const n = d.sources.filter(x => x.category === s.category).length;
      list.appendChild(el("div", "pgroup",
        (s.category === "ai" ? "Frontier AI" : "Cybersecurity") + ` (${n})`));
    }
    const rowEl = el("label", "prow");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = !state.disabled.has(s.id);
    cb.onchange = () => {
      cb.checked ? state.disabled.delete(s.id) : state.disabled.add(s.id);
      persistDisabled();
    };
    rowEl.appendChild(cb);
    const h = el("span", "health " + s.status);
    h.title = s.status === "error" ? (s.error || "error") : s.status;
    rowEl.appendChild(h);
    const nm = el("span", "pname", (s.preferred ? "★ " : "") + s.name);
    nm.title = s.feed;
    rowEl.appendChild(nm);
    rowEl.appendChild(el("span", "pcount", s.items ? s.items + " items" : ""));
    list.appendChild(rowEl);
  }
}
function persistDisabled() {
  localStorage.setItem("disabled", JSON.stringify([...state.disabled]));
  clearSavedSelection();
  applyView(false);
  if (state.sources) {
    const ok = state.sources.filter(s => s.status === "ok").length;
    const bad = state.sources.filter(s => s.status === "error").length;
    $("psub").textContent =
      `${state.sources.length} total · ${ok} live · ${bad} failing · ${state.disabled.size} hidden`;
  }
}
function setAll(pred) {
  state.disabled = new Set(state.sources.filter(s => !pred(s)).map(s => s.id));
  persistDisabled();
  loadSources();
}
function openPanel() {
  $("panel").classList.add("open");
  $("backdrop").classList.add("open");
  loadSources();
}
function closePanel() {
  $("panel").classList.remove("open");
  $("backdrop").classList.remove("open");
}

/* ---------- saved views ---------- */
function persistSavedViews() {
  state.savedViews = state.savedViews.slice(0, 20);
  localStorage.setItem("savedViews", JSON.stringify(state.savedViews));
}

function renderSavedViews(selected = "") {
  const select = $("savedViews");
  select.textContent = "";
  const placeholder = el("option", null, "Saved views");
  placeholder.value = "";
  select.appendChild(placeholder);
  for (const view of state.savedViews) {
    const option = el("option", null, view.name);
    option.value = view.id;
    select.appendChild(option);
  }
  select.value = selected;
  $("deleteViewBtn").hidden = !selected;
}

function clearSavedSelection() {
  $("savedViews").value = "";
  $("deleteViewBtn").hidden = true;
}

function saveCurrentView() {
  const suggested = state.q ||
    (state.tab === "all" ? "My view" : state.tab[0].toUpperCase() + state.tab.slice(1));
  const name = window.prompt("Name this saved view:", suggested);
  if (!name || !name.trim()) return;
  const cleanName = name.trim().slice(0, 60);
  const existing = state.savedViews.find(view =>
    view.name.toLowerCase() === cleanName.toLowerCase());
  const view = {
    id: existing ? existing.id : String(Date.now()), name: cleanName,
    tab: state.tab, sort: state.sort, q: state.q,
    disabled: [...state.disabled], hideRead: state.hideRead,
  };
  if (existing) Object.assign(existing, view);
  else state.savedViews.unshift(view);
  persistSavedViews();
  renderSavedViews(view.id);
}

function applySavedView(view) {
  state.tab = view.tab || "all";
  state.sort = view.sort || "smart";
  state.q = view.q || "";
  state.disabled = new Set(view.disabled || []);
  state.hideRead = Boolean(view.hideRead);
  localStorage.setItem("tab", state.tab);
  localStorage.setItem("sort", state.sort);
  localStorage.setItem("disabled", JSON.stringify([...state.disabled]));
  localStorage.setItem("hideRead", state.hideRead ? "1" : "0");
  $("search").value = state.q;
  $("sort").value = state.sort;
  $("hideRead").checked = state.hideRead;
  document.querySelectorAll("#tabs button").forEach(button =>
    button.classList.toggle("on", button.dataset.tab === state.tab));
  applyView(false);
}

function deleteSelectedView() {
  const id = $("savedViews").value;
  if (!id) return;
  state.savedViews = state.savedViews.filter(view => view.id !== id);
  persistSavedViews();
  renderSavedViews();
}

/* ---------- wiring ---------- */
$("tabs").addEventListener("click", e => {
  const b = e.target.closest("button");
  if (!b) return;
  state.tab = b.dataset.tab;
  localStorage.setItem("tab", state.tab);
  clearSavedSelection();
  document.querySelectorAll("#tabs button").forEach(x => x.classList.toggle("on", x === b));
  applyView(false);
});
let debounce;
$("search").addEventListener("input", e => {
  clearTimeout(debounce);
  debounce = setTimeout(() => {
    state.q = e.target.value.trim(); clearSavedSelection(); applyView(false);
  }, 300);
});
$("search").addEventListener("keydown", e => {
  if (e.key === "Escape") {
    e.target.value = ""; state.q = ""; clearSavedSelection(); applyView(false);
  }
});
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement !== $("search")) {
    e.preventDefault(); $("search").focus();
  }
});
$("sort").value = state.sort;
$("sort").addEventListener("change", e => {
  state.sort = e.target.value;
  localStorage.setItem("sort", state.sort);
  clearSavedSelection();
  applyView(false);
});
$("hideRead").checked = state.hideRead;
$("hideRead").addEventListener("change", e => {
  state.hideRead = e.target.checked;
  localStorage.setItem("hideRead", state.hideRead ? "1" : "0");
  clearSavedSelection();
  applyView(false);
});
$("savedViews").addEventListener("change", e => {
  const view = state.savedViews.find(candidate => candidate.id === e.target.value);
  $("deleteViewBtn").hidden = !view;
  if (view) applySavedView(view);
});
$("saveViewBtn").addEventListener("click", saveCurrentView);
$("deleteViewBtn").addEventListener("click", deleteSelectedView);
$("moreBtn").addEventListener("click", () => { state.offset += PAGE; applyView(true); });
$("refreshBtn").addEventListener("click", async () => {
  $("refreshBtn").classList.add("spin");
  await fetch("api/refresh", { method: "POST" });
  schedulePoll(true);
});
$("sourcesBtn").addEventListener("click", openPanel);
$("pclose").addEventListener("click", closePanel);
$("backdrop").addEventListener("click", closePanel);
$("allOn").addEventListener("click", () => setAll(() => true));
$("allOff").addEventListener("click", () => setAll(() => false));
$("prefOnly").addEventListener("click", () => setAll(s => s.preferred));

/* ---------- boot ---------- */
document.querySelectorAll("#tabs button").forEach(b =>
  b.classList.toggle("on", b.dataset.tab === state.tab));
renderSavedViews();
skeletons(8);
fetchAll();
</script>
</body>
</html>
