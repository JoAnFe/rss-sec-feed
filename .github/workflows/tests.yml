name: Tests

on:
  push:
    branches-ignore: []      # run on every branch push
  pull_request:
  workflow_dispatch:

jobs:
  unittest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v
